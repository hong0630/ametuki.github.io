<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業轉盤抽獎系統</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="轉盤抽獎">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        /* 主容器 RWD：預設橫向，手機縱向 */
        .container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            background: white; 
            padding: 20px; 
            width: 100%;
            max-width: 1000px;
            margin: auto;
        }

        /* 轉盤區：在手機上優先顯示 */
        .wheel-section { 
            flex: 1.2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            position: relative;
            min-width: 0; /* 防止 Canvas 撐破容器 */
        }

        /* 轉盤自適應：寬度設為 90vw (最大 450px) */
        #canvasContainer {
            position: relative;
            width: 90vw;
            max-width: 450px;
            aspect-ratio: 1 / 1;
        }

        canvas { 
            width: 100% !important; 
            height: auto !important; 
            border-radius: 50%; 
            border: 6px solid #334155; 
        }

        .pointer { 
            position: absolute; 
            top: -5px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 12px solid transparent; 
            border-right: 12px solid transparent; 
            border-top: 25px solid #ef4444; 
            z-index: 10; 
        }

        /* 控制面板 RWD */
        .control-section { 
            flex: 0.8; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            min-width: 300px;
        }

        h3, h4 { margin: 10px 0 5px; }

        .input-group { display: flex; gap: 8px; align-items: center; }
        input, button { 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 10px; 
            font-size: 16px; /* iOS 防止自動放大 input */
        }
        
        input[type="text"] { flex: 1; }
        
        button { 
            cursor: pointer; 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: 600; 
            transition: active 0.1s; 
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        .list-container { 
            border: 1px solid #f1f5f9; 
            border-radius: 12px; 
            height: 150px; 
            overflow-y: auto; 
            padding: 8px; 
            background: #f8fafc; 
        }
        
        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 6px; 
            background: white; 
            padding: 8px 12px; 
            border-radius: 8px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .del-btn { color: #ef4444; background: none; padding: 4px 8px; }

        .winners-box { 
            border-top: 2px solid #f1f5f9; 
            margin-top: 10px; 
            padding-top: 10px; 
        }
        
        .winner-item { 
            color: #059669; 
            font-weight: bold; 
            margin-bottom: 6px; 
            padding: 10px; 
            background: #ecfdf5; 
            border-radius: 8px; 
        }

        #statusText { margin: 15px 0; font-size: 1.1rem; font-weight: bold; text-align: center; }

        /* 手機版樣式調整 (Media Query) */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { 
                flex-direction: column; 
                padding: 15px; 
                border-radius: 0;
                box-shadow: none;
                background: var(--bg);
            }
            .wheel-section { margin-bottom: 20px; }
            .control-section { width: 100%; min-width: unset; background: white; padding: 20px; border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="wheel-section">
        <div id="canvasContainer">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="900" height="900"></canvas> 
            </div>
        <div id="statusText">準備就緒</div>
    </div>

    <div class="control-section">
        <h3>選項管理</h3>
        <div class="input-group">
            <input type="text" id="optionInput" placeholder="輸入選項名稱...">
            <button onclick="addOption()">新增</button>
        </div>
        <div class="list-container" id="optionList"></div>

        <div class="input-group">
            <label>抽出人數：</label>
            <input type="number" id="drawCount" value="1" min="1" style="width: 70px;">
        </div>
        
        <button id="spinBtn" onclick="handleButtonClick()" style="width: 100%; padding: 16px; font-size: 1.2em; border-radius: 12px;">開始抽獎</button>

        <div class="winners-box">
            <h4>中獎名單</h4>
            <div id="winnerList"></div>
        </div>
    </div>
</div>

<script>
    // --- 1. PWA Service Worker 註冊 (補回) ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // 確保 sw.js 檔案與此 HTML 放在同一目錄下
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('Service Worker 註冊成功:', reg.scope);
            }).catch(err => {
                console.log('Service Worker 註冊失敗:', err);
            });
        });
    }

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const statusText = document.getElementById('statusText');
    
    // --- 2. 資料初始化 (優先從 localStorage 讀取) ---
    let originalOptions = JSON.parse(localStorage.getItem('originalOptions')) || ["選項 A", "選項 B", "選項 C", "選項 D", "選項 E", "選項 F"];
    let currentOptions = JSON.parse(localStorage.getItem('currentOptions')) || [...originalOptions];
    let winners = JSON.parse(localStorage.getItem('winners')) || [];
    let visualRotation = parseFloat(localStorage.getItem('visualRotation')) || 0;
    let currentRotation = 0; 

    let isAnimating = false;
    let pendingWinnerIndex = -1;
    let remainingDraws = 0;

    const colors = ['#6366f1', '#ec4899', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#f43f5e'];

    // 儲存資料到本地
    function saveData() {
        localStorage.setItem('originalOptions', JSON.stringify(originalOptions));
        localStorage.setItem('currentOptions', JSON.stringify(currentOptions));
        localStorage.setItem('winners', JSON.stringify(winners));
        localStorage.setItem('visualRotation', visualRotation.toString());
    }

    function drawWheel(fadeIndex = -1) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 10;
        const total = currentOptions.length;
        if (total === 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            return;
        }
        const arcSize = (Math.PI * 2) / total;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(currentRotation);

        currentOptions.forEach((opt, i) => {
            const angle = i * arcSize;
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.globalAlpha = (i === fadeIndex) ? 0.3 : 1.0;
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, radius, angle, angle + arcSize);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.rotate(angle + arcSize / 2);
            ctx.fillStyle = "#fff";
            ctx.font = "bold 18px sans-serif";
            ctx.textAlign = "right";
            ctx.fillText(opt, radius - 30, 8);
            ctx.restore();
        });
        ctx.restore();
    }

    async function handleButtonClick() {
        if (isAnimating) return;

        // 判斷是否需要重置系統
        if (remainingDraws === 0 && winners.length > 0 && pendingWinnerIndex === -1) {
            resetSystem();
            return;
        }

        if (pendingWinnerIndex !== -1) {
            currentOptions.splice(pendingWinnerIndex, 1);
            pendingWinnerIndex = -1;
            saveData();
            drawWheel(); 
            setTimeout(spin, 100);
        } else {
            remainingDraws = parseInt(document.getElementById('drawCount').value);
            if (currentOptions.length < remainingDraws) {
                alert("剩餘選項不足！");
                return;
            }
            spin();
        }
    }

    function spin() {
        isAnimating = true;
        spinBtn.disabled = true;
        statusText.innerText = "轉動中...";

        const total = currentOptions.length;
        const winnerIdx = Math.floor(Math.random() * total);
        const arcSize = (Math.PI * 2) / total;

        const extraSpins = 5 * 2 * Math.PI;
        const pointerOffset = 1.5 * Math.PI;
        const targetSectorCenter = (winnerIdx + 0.5) * arcSize;
        
        const angleToMove = (pointerOffset - (visualRotation % (2 * Math.PI)) - targetSectorCenter + (2 * Math.PI)) % (2 * Math.PI);
        visualRotation += angleToMove + extraSpins;

        canvas.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.1, 1)";
        canvas.style.transform = `rotate(${visualRotation}rad)`;

        setTimeout(() => {
            isAnimating = false;
            pendingWinnerIndex = winnerIdx;
            const winnerName = currentOptions[winnerIdx];
            
            statusText.innerText = `恭喜中獎：${winnerName}`;
            drawWheel(winnerIdx);
            
            winners.push(winnerName);
            saveData(); 
            updateWinnerUI();

            remainingDraws--;
            spinBtn.disabled = false;

            if (remainingDraws > 0 && currentOptions.length > 1) {
                spinBtn.innerText = `抽取下一位 (剩餘 ${remainingDraws})`;
            } else {
                spinBtn.innerText = "重置抽獎系統";
                remainingDraws = 0;
            }
        }, 4000);
    }

    function updateWinnerUI() {
        const winList = document.getElementById('winnerList');
        winList.innerHTML = winners.map((name, i) => `
            <div class="winner-item">第 ${i+1} 位：${name}</div>
        `).join('');
    }

    function resetSystem() {
        if(!confirm("確定要重置所有選項與中獎紀錄嗎？")) return;
        
        localStorage.clear();
        originalOptions = ["選項 A", "選項 B", "選項 C", "選項 D", "選項 E", "選項 F"];
        currentOptions = [...originalOptions];
        winners = [];
        pendingWinnerIndex = -1;
        remainingDraws = 0;
        visualRotation = 0;
        
        canvas.style.transition = "none";
        canvas.style.transform = "rotate(0rad)";
        saveData();
        updateWinnerUI();
        updateOptionUI();
        spinBtn.innerText = "開始抽獎";
        statusText.innerText = "系統已重置";
    }

    function addOption() {
        const input = document.getElementById('optionInput');
        if (input.value.trim()) {
            originalOptions.push(input.value.trim());
            currentOptions = [...originalOptions];
            saveData();
            updateOptionUI();
            input.value = "";
        }
    }

    function removeOption(idx) {
        originalOptions.splice(idx, 1);
        currentOptions = [...originalOptions];
        saveData();
        updateOptionUI();
    }

    function updateOptionUI() {
        const list = document.getElementById('optionList');
        list.innerHTML = originalOptions.map((opt, i) => `
            <div class="item">${opt}<button class="del-btn" onclick="removeOption(${i})">✕</button></div>
        `).join('');
        drawWheel();
    }

    // --- 3. 頁面初始渲染與視覺回復 ---
    function init() {
        canvas.style.transition = "none";
        canvas.style.transform = `rotate(${visualRotation}rad)`;
        updateWinnerUI();
        updateOptionUI();
        // 如果上次結束時還有剩餘中獎者沒移除，按鈕文字要對應
        if (winners.length > 0 && pendingWinnerIndex === -1 && remainingDraws === 0) {
            spinBtn.innerText = "重置抽獎系統";
        }
    }

    init();
</script>
</body>
</html>
